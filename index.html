<!DOCTYPE html>
<html>
<head>
    <title>Pi & Friends Web Suite</title>
    <style>
        body {
            display: flex;
            height: 100vh;
            margin: 0;
            background: #1a1b26;
            color: #a9b1d6;
            overflow: hidden;
        }

        #sidebar {
            width: 350px;
            min-width: 350px;
            padding: 20px;
            border-right: 1px solid #414868;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #16161e;
        }

        #console {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #0f111a;
        }

        #output {
            flex-grow: 1;
            padding: 25px;
            font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            color: #89ddff;
            overflow-y: auto;
            overflow-x: hidden;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
        }

        .input-group {
            margin: 10px 0;
            padding: 10px;
            background: #24283b;
            border-radius: 4px;
        }

        input {
            background: #1a1b26;
            border: 1px solid #414868;
            color: white;
            padding: 5px;
        }
    </style>
</head>
/*
. 
. 
*/
<body>
<div id="sidebar">

    <h3>Roots Demo</h3>
    <input type="number" id="radical" value="2">
    <input type="number" id="workpiece" value="49">
    <button class="btn" style="background: #e0af68; color: #1a1b26; margin-top: 10px;" onclick="startRoots()">Square and Cube Roots Calculation</button>
    <hr style="border: 0; border-top: 1px solid #414868; margin: 20px 0;">

    <h3> - - - Pi Methods: - - - </h3>

    <button class="btn" style="background: #ff9e64; color: #1a1b26;" onclick="start('archimedes')">
        Archimedes Method<br>
        Archimedes method for finding π, improved by Richard Woolley,
        easy to understand geometric method using big.Float variables
        produces 3,012 digits of delicious Pi in under a minute, from way back in 230 BCE
        <br>-*-*-*- Rick's personal favorite -*-*-*-
    </button>
    <hr style="border: 0; border-top: 1px solid #414868; margin: 20px 0;">

    <div class="input-group">
        <label>Spigot Digits (800+ to see Feynman Point):</label>
        <input type="number" id="spigotDigits" value="900">
    </div>
    <button class="btn" style="background: #e0af68; color: #1a1b26;" onclick="runSpigot()">
        The Spigot Algorithm -- Honest Edition<br>
        integer arithmetic only -- no floating point anywhere<br>
        Run 1: digits flash at full CPU speed, timed to the microsecond<br>
        Run 2: fresh computation -- uncertain digits shown in red as '?'<br>
        resolved on screen the moment the algorithm actually knows<br>
        set to 800+ digits for a surprise Easter egg at position 762
    </button>
    <hr style="border: 0; border-top: 1px solid #414868; margin: 20px 0;">

    <div class="input-group">
        <label>BBP Digits:</label>
        <input type="number" id="bbpDigits" value="1000">
    </div>
    <button class="btn" onclick="runBBP()">
        Bailey–Borwein–Plouffe (BBP)<br>
        revolutionized computational mathematics when it was discovered in 1995 by David H. Bailey, Peter Borwein and Simon Plouffe
        <br>calculates any specific digit of π in hexadecimal without knowing the digits that preceded it. Uses an integer relation algorithm (PSLQ). It was a "computer-first" discovery that stunned mathematicians.
        <div class="math-display">
            &pi; = &sum; <span class="sub-sup"><sup>&infin;</sup><sub>k=0</sub></span>
            [ 1/16<sup>k</sup> ( 4/8k+1 - 2/8k+4 - 1/8k+5 - 1/8k+6 ) ]
        </div>
    </button>
    <hr style="border: 0; border-top: 1px solid #414868; margin: 20px 0;">

    <div class="input-group">
        <label>Monty Grid Size:</label>
        <input type="number" id="gridSize" value="5000">
    </div>
    <button class="btn" style="background: #7aa2f7; color: #1a1b26;" onclick="runMonty()">
        the Monte Carlo method<br>
        big floats, & float64
        Flavor: no fancy equations are used, only Go's pure randomness, 4 digits of pi in 21s; 7 digits possible in 1h30m with a 119k grid
        <br>-*-*- Rick's second-favorite method -*-*-
    </button>
    <hr style="border: 0; border-top: 1px solid #414868; margin: 20px 0;">

        <div class="input-group">
        <label>Chudnovsky Digits:</label>
        <input type="number" id="chudDigits" value="1000">
    </div>
    <button class="btn" onclick="runChudnovsky()">
        Run Chudnovsky<br>
        by David & Gregory Chudnovsky, late 1980s,
        extremely efficient, quickly bakes world-record quantities of Pi
        this algorithm is a rapidly converging infinite series which
        leverages properties of j-invariant from elliptic function theory
    </button>
    <hr style="border: 0; border-top: 1px solid #414868; margin: 20px 0;">

        <button class="btn" style="background: #9ece6a; color: #1a1b26;" onclick="start('customseries')">
        Custom Series <br>
        I don't remember where it's from ... <br>
        but it is very quick, 4s gets us 9 digits of Pi<br>
        π = (4/1) - (4/3) + (4/5) - (4/7) + (4/9) - (4/11) + (4/13) - (4/15)
    </button>
    <hr style="border: 0; border-top: 1px solid #414868; margin: 20px 0;">

    <button class="btn" style="background: #4fd1c5; color: #1a1b26;" onclick="start('gauss')">
        Gauss-Legendre<br>
        C F Gauss, refined by Adrien-Marie Legendre<br>
        π ≈ (aₙ + bₙ)² / (4 tₙ)<br>
        only manages to do 10 digits of Pi in well-over five minutes, an infinite series circa 1655<br>
        --- served here by Rick Woolley ---
    </button>
    <hr style="border: 0; border-top: 1px solid #414868; margin: 20px 0;">

    <button class="btn" style="background: #bb9af7; color: #1a1b26;" onclick="start('gregory')">
        Gregory-Leibniz: 4B iters runs 27s on Mac, 4B runs 5m42s on web. Gives 10 digits of Pi<br>
        James Gregory 1638–1675  Gottfried Wilhelm Leibniz 1646-1716 <br>
        π = 4 * ( 1 - 1/3 + 1/5 - 1/7 + 1/9 ...)
    </button>
    <hr style="border: 0; border-top: 1px solid #414868; margin: 20px 0;">

    <div class="input-group">
        <label>Iters:</label>
        <input type="number" id="itersInput" value="1000000">
        <label>Precision:</label>
        <input type="number" id="precisionInput" value="512">
    </div>
    <button class="btn" style="background: #9ece6a; color: #1a1b26;" onclick="runNilakantha()">
        <strong>Nilakantha Series</strong><br>
        &pi; = 3 + 4/(2&times;3&times;4) - 4/(4&times;5&times;6) + 4/(6&times;7&times;8) ...
        <br>High-precision convergence by Nilakantha Somayaji
    </button>
    <hr style="border: 0; border-top: 1px solid #414868; margin: 20px 0;">

    <button class="btn" style="background: #9ece6a; color: #1a1b26;" onclick="start('nilakantha_classic')">
        Nilakantha Somayaji's Alternating Series (c. 1530) — Concurrent Two-Phase Precision Climb<br>
        Phase 1: float64, 5,000 goroutines, milestone broadcast as each decimal digit locks in<br>
        Phase 2: big.Float · 512-bit · 15,000 terms · pushes past the float64 wall into genuine arbitrary precision<br>
        <br>
        π = 3 + 4/(2·3·4) − 4/(4·5·6) + 4/(6·7·8) − ···<br>
        Kerala school of astronomy and mathematics · predates Newton by 150 years
    </button>
    <hr style="border: 0; border-top: 1px solid #414868; margin: 20px 0;">

    <button class="btn" style="background: #9ece6a; color: #1a1b26;" onclick="start('wallis')">
        Wallis<br>
        <br>
    </button>
    <hr style="border: 0; border-top: 1px solid #414868; margin: 20px 0;">


    <button class="btn" style="background: #f7768e; color: white;" onclick="stopCurrent()">
        Stop/Clear Calculation
    </button>
 </div>


<div id="console">
    <div id="output">By Richard (Rick) Woolley.
Back-end written in Go (golang).
Source code available at https://github.com/Kazzyman/PiAndFriendsWeb.<br>
Select a method from the panel on the left to begin...<span id="cursor"></span></div>
    <div id="status" style="padding: 10px 25px 10px 25px; color: #7aa2f7; font-size: 12px; font-style: italic; flex-shrink: 0;"></div>
</div>
/*
. 
. 
*/
// ::: BEGIN script functions
<script>
    let currentEventSource = null;

// Roots
    function startRoots() {
        const rad = document.getElementById('radical').value;
        const work = document.getElementById('workpiece').value;
        start(`roots&radical=${rad}&workpiece=${work}`);
    }

// no arch

// Spigot
    function runSpigot() {
        const digits = document.getElementById('spigotDigits').value || 900;
        start(`spigot&digits=${digits}`);
    }

// BBP
    function runBBP() {
        const digits = document.getElementById('bbpDigits').value || 1000;
        start(`bbp&digits=${digits}`);
    }

// Monte
    function runMonty() {
        const size = document.getElementById('gridSize').value || 5000;
        start(`monte&gridSize=${size}`);
    }

// Chud
    function runChudnovsky() {
        const digits = document.getElementById('chudDigits').value || 1000;
        start(`chudnovsky&digits=${digits}`);
    }

// no custom
// no gauss
// no greg l.

// Nila
    function runNilakantha() {
        const iters = document.getElementById('itersInput').value;
        const prec = document.getElementById('precisionInput').value;
        start(`nilakantha&iters=${iters}&precision=${prec}`);
    }

// no nila classic scoreboard 
// no wallis

// STOP current 
 function stopCurrent(clearScreen = true) {
    if (currentEventSource) {
        currentEventSource.close();
        currentEventSource = null;
    }

    document.getElementById('status').innerText = "System Ready.";

    if (clearScreen) {
        const output = document.getElementById('output');
        output.innerHTML = 
            `By Richard (Rick) Woolley.
Back-end written in Go (golang).
Source code available at https://github.com/Kazzyman/PiAndFriendsWeb.<br>
Select a method from the panel on the left to begin...<span id="cursor"></span>`;
    }
}
// ::: END OF scrips functions 
/*
. 
. 
*/
// ::: EVENTS start
    function start(method) {
        stopCurrent(false);
        const out = document.getElementById('output');
        const status = document.getElementById('status');
        out.innerHTML = 'By Richard (Rick) Woolley.\nBack-end written in Go (golang).\nSource code available at https://github.com/Kazzyman/PiAndFriendsWeb.\n\n<span id="cursor"></span>';
        status.innerText = "Connecting to engine...";

        currentEventSource = new EventSource(`/run?method=${method}`);

        currentEventSource.onmessage = (e) => {
            status.innerText = "Engine streaming...";
            const data = e.data;
            const cursor = document.getElementById('cursor');

            const escape = s => s
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');

            if (data.startsWith("UPDATE:HASRED:")) {
                const raw = escape(data.slice(14));
                const colored = raw.replace(/\?/g, '<span style="color:#f7768e">?</span>');
                cursor.innerHTML = colored;

            } else if (data.startsWith("UPDATE:")) {
                cursor.innerHTML = escape(data.slice(7));

            } else if (data.startsWith("COLOR:")) {
                const rest  = data.slice(6);
                const colon = rest.indexOf(":");
                const color = rest.slice(0, colon);
                const text  = escape(rest.slice(colon + 1));
                const colorMap = {
                    red:    "#f7768e",
                    green:  "#9ece6a",
                    yellow: "#e0af68",
                    cyan:   "#7dcfff",
                };
                const hex = colorMap[color] || color;
                cursor.outerHTML =
                    (cursor.innerHTML ? cursor.innerHTML : '') +
                    '\n<span style="color:' + hex + '">' + text + '</span>' +
                    '<span id="cursor"></span>';

            } else {
                cursor.outerHTML =
                    (cursor.innerHTML ? cursor.innerHTML : '') +
                    '\n' + escape(data) +
                    '<span id="cursor"></span>';
            }

            out.scrollTop = out.scrollHeight;
        };

        currentEventSource.onerror = () => {
            status.innerText = "Connection closed (Calculation Complete).";
            if (currentEventSource) {
                currentEventSource.close();
                currentEventSource = null;
            }
        };
    }
// ::: END of start

    window.onload = () => {
        document.getElementById('status').innerText = "System Ready.";
    };
</script>
</body>
</html>
