<!DOCTYPE html>
<html>
<head>
    <title>Pi & Friends Web Suite</title>
    <style>
        body {
            display: flex;
            height: 100vh;
            margin: 0;
            background: #1a1b26;
            color: #a9b1d6;
            overflow: hidden;
        }

        #sidebar {
            width: 350px;
            min-width: 350px;
            padding: 20px;
            border-right: 1px solid #414868;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #16161e;
        }

        /* The Console wrapper needs to grow to fill the screen */
        #console {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #0f111a;
        }

        #output {
            flex-grow: 1;
            padding: 25px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 14px;
            line-height: 1.5;
            color: #89ddff;
            overflow-y: auto; /* This makes the output scrollable */
            overflow-x: hidden;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div id="sidebar">
   
    <h3>Roots Demo</h3>
        <input type="number" id="radical" value="2">
    <input type="number" id="workpiece" value="49">
    <button class="btn" style="background: #e0af68; color: #1a1b26; margin-top: 10px;" onclick="startRoots()">Square and Cube Roots Calculation</button>

    <hr style="border: 0; border-top: 1px solid #414868; margin: 20px 0;">
    <hr style="border: 0; border-top: 1px solid #414868; margin: 20px 0;">

    <h3>  - - - Pi Methods: - - - </h3>
    
    <button class="btn" style="background: #ff9e64; color: #1a1b26;" onclick="start('archimedes')">Archimedes Method<br>Archimedes method for finding π, improved by Richard Woolley, 
        easy to understand geometric method using big.Float variables 
        produces 3,012 digits of delicious Pi in under a minute, from way back in 230 BCE 
        <br>-*-*-*- Rick's personal favorite -*-*-*-</button>
    <hr style="border: 0; border-top: 1px solid #414868; margin: 20px 0;">

    <div class="input-group">
        <label>BBP Digits:</label>
        <input type="number" id="bbpDigits" value="1000">
    </div>
    <button class="btn" onclick="runBBP()">Bailey–Borwein–Plouffe (BBP)<br>revolutionized computational mathematics when it was discovered in 1995 by David H. Bailey, Peter Borwein and Simon Plouffe
    <br>calculates any specific digit of π in hexadecimal without knowing the digits that preceded it. Uses an integer relation algorithm (PSLQ). It was a "computer-first" discovery that stunned mathematicians. 
        <div class="formula-title">.</div>
        <div class="math-display">
            &pi; = &sum; <span class="sub-sup"><sup>&infin;</sup><sub>k=0</sub></span>
            [ 1/16<sup>k</sup> ( 4/8k+1 - 2/8k+4 - 1/8k+5 - 1/8k+6 ) ]
        </div></button>

   
    
    <hr style="border: 0; border-top: 1px solid #414868; margin: 20px 0;">

    <div class="input-group">
        <label>Monty Grid Size:</label>
        <input type="number" id="gridSize" value="5000">
    </div>
    <button class="btn" style="background: #7aa2f7; color: #1a1b26;" onclick="start('monte')">the Monte Carlo method<br>big floats, & float64 
        Flavor: no fancy equations are used, only Go's pure randomness, 4 digits of pi in 21s; 7 digits possible in 1h30m with a 119k grid
        <br>-*-*- Rick's second-favorite method -*-*-</button>
    <hr style="border: 0; border-top: 1px solid #414868; margin: 20px 0;">

    <div class="input-group">
        <label>Chudnovsky Digits:</label>
        <input type="number" id="chudDigits" value="1000">
    </div>
    <button class="btn" onclick="runChudnovsky()">Run Chudnovsky<br>by David & Gregory Chudnovsky, late 1980s, 
        extremely efficient, quickly bakes world-record quantities of Pi 
        this algorithm is a rapidly converging infinite series which 
        leverages properties of j-invariant from elliptic function theory</button>
    <hr style="border: 0; border-top: 1px solid #414868; margin: 20px 0;">

    <button class="btn" style="background: #9ece6a; color: #1a1b26;" onclick="start('customseries')">Custom Series <br> I don&apos;t remember 
        where it&apos;s from ... <br>but it is very quick, 4s gets us 9 digits of Pi<br>π = (4/1) - (4/3) + (4/5) - (4/7) + (4/9) - (4/11) + (4/13) - (4/15)</button>
    <hr style="border: 0; border-top: 1px solid #414868; margin: 20px 0;">

    <button class="btn" style="background: #4fd1c5; color: #1a1b26;" onclick="start('gauss')">Gauss-Legendre<br>C F Gauss, refined by Adrien-Marie Legendre<br>
        π ≈ (aₙ + bₙ)² / (4 tₙ)<br>only manages to do 10 digits of Pi in well-over five minutes, an infinite series circa 1655<br>--- served here by Rick Woolley ---</button>
    <hr style="border: 0; border-top: 1px solid #414868; margin: 20px 0;">

    <button class="btn" style="background: #bb9af7; color: #1a1b26;" onclick="start('gregory')">Gregory-Leibniz: runs 20sec <br> gives 10 digits of Pi" +
        "James Gregory 1638–1675  Gottfried Wilhelm Leibniz 1646-1716 <br> π = 4 * ( 1 - 1/3 + 1/5 - 1/7 + 1/9 ...) "</button>
    <hr style="border: 0; border-top: 1px solid #414868; margin: 20px 0;">

    
    
    
    <hr style="border: 0; border-top: 1px solid #414868; margin: 20px 0;">
    <button class="btn" style="background: #f7768e; color: white;" onclick="stopCurrent()">Stop/Clear Calculation</button>
    <hr style="border: 0; border-top: 1px solid #414868; margin: 20px 0;">

</div>

<div id="console">
    <div id="status" style="padding: 10px 25px 0 25px; color: #7aa2f7; font-size: 12px; font-style: italic;">
        System Ready.
    </div>
    <div id="output">By Richard (Rick) Woolley. <br>Select a method from the panel on the left to begin...</div>
</div>

<script>
    let currentEventSource = null;

    function runChudnovsky() {
        const digits = document.getElementById('chudDigits').value || 1000;
        start(`chudnovsky&digits=${digits}`);
    }
    
    function runBBP() {
        const digits = document.getElementById('bbpDigits').value || 1000;
        // URL format: /run?method=bbp&digits=1000
        start(`bbp&digits=${digits}`);
    }

    function runMonty() {
        const size = document.getElementById('gridSize').value || 1000;
        // This tells the engine: "Run monte with this grid size"
        start(`monte&gridSize=${size}`);
    }
    
    function startRoots() {
        // 1. Grab the values from your HTML input fields
        const rad = document.getElementById('radical').value;
        const work = document.getElementById('workpiece').value;

        // 2. Call your existing start() function with the formatted method string
        // This creates the URL: /run?method=roots&radical=2&workpiece=49
        start(`roots&radical=${rad}&workpiece=${work}`);
    }

    function start(method) {
        stopCurrent(false); // Close old, but don't wipe the screen results

        const out = document.getElementById('output');
        const status = document.getElementById('status');

        // Clear the board for the new run
        out.innerText = "";
        status.innerText = "Connecting to engine...";

        currentEventSource = new EventSource(`/run?method=${method}`);

        /*
        currentEventSource.onmessage = (e) => {
            // Log it to the F12 console just so you can see the 'ghost' data
            console.log("Message received:", e.data);

            // If it's a comment/padding or empty, just ignore it
            if (!e.data || e.data.trim() === "" || e.data.startsWith(":")) {
                return;
            }

            // Update status once real data arrives
            if (status.innerText !== "Engine streaming...") {
                status.innerText = "Engine streaming...";
            }

            out.innerText += e.data + "\n\n";
            out.scrollTop = out.scrollHeight;
        };
        
         */

        currentEventSource.onmessage = (e) => {
            const out = document.getElementById('output');

            // 1. If the message is exactly 1 character long, don't add a newline
            if (e.data.length === 1) {
                out.innerText += e.data;
            } else {
                // 2. For headers and status messages, keep the spacing
                out.innerText += "\n" + e.data + "\n";
            }

            // 3. Keep the scroll at the bottom
            out.scrollTop = out.scrollHeight;
        };
        

        currentEventSource.onerror = () => {
            status.innerText = "Connection closed (Calculation Complete).";
            if (currentEventSource) {
                currentEventSource.close();
                currentEventSource = null;
            }
            // Notice: We do NOT clear out.innerText here anymore!
        };
    }

    // Updated stopCurrent to accept a 'clearScreen' flag
    function stopCurrent(clearScreen = true) {
        if (currentEventSource) {
            currentEventSource.close();
            currentEventSource = null;
        }
        document.getElementById('status').innerText = "System Ready."; // Attempting to fix this per Gemini?
        
        if (clearScreen) {
            document.getElementById('output').innerText = "";
        }
    }

    // <input type="number" id="radical" placeholder="Radical (2 or 3)" style="padding: 8px; background: #24283b; border: 1px solid #414868; color: white;">
    // <input type="number" id="workpiece" placeholder="Workpiece" style="padding: 8px; background: #24283b; border: 1px solid #414868; color: white; margin-top: 5px;">
    
    //    <button class="btn" onclick="startRoots()">Run Roots Demo</button>    
</script>
</body>
</html>
